<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alessi Still</title>
  <style>
    :root{
      --bg:#f2efe7;
      --ink:#111;
      --muted:#6a6a6a;
      --accent:#e24a1a;
      --max:1200px;

      --grid-gap:16px;
      --sq-left:280px;
      --sq-right:220px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    a{color:inherit;text-decoration:none}
    a:hover{opacity:0.92}

    header{
      position:sticky;top:0;z-index:50;width:100%;
      background:linear-gradient(to bottom, rgba(242,239,231,0.98), rgba(242,239,231,0.90));
      backdrop-filter:saturate(120%) blur(6px);
      border-bottom:1px solid rgba(0,0,0,0.08);
    }
    .header-inner{width:100%;padding:14px 32px;display:flex;justify-content:center;align-items:center}
    .nav{
      display:flex;gap:34px;font-size:12px;letter-spacing:0.10em;text-transform:uppercase;
      color:var(--muted);font-family: Arial, Helvetica, sans-serif;width:100%;justify-content:center;
    }

    .page{max-width:var(--max);margin:0 auto;padding:18px 24px 0;min-height:100vh;display:flex;flex-direction:column;gap:18px}
    main{display:flex;flex-direction:column;gap:0}

    .hero{width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;padding:24px 0 140px}
    .kicker{
      width:min(760px, 92vw);margin:0;font-family: Arial, Helvetica, sans-serif;font-size:12px;line-height:1.2;
      color:var(--muted);letter-spacing:0.10em;text-transform:lowercase;text-align:left;padding-left:2px
    }
    .media-wrap{width:min(760px, 92vw);position:relative}
    .media{width:100%;aspect-ratio:16/9;background:rgba(255,255,255,0.35);border:1px solid rgba(0,0,0,0.10);overflow:hidden}
    .media img{width:100%;height:100%;object-fit:cover;display:block;filter:none}
    .title{
      position:absolute;left:50%;top:100%;transform:translate(-50%, -50%);width:100%;text-align:center;
      font-family: ui-serif, Georgia, "Times New Roman", Times, serif;font-weight:700;letter-spacing:0.06em;line-height:0.90;
      font-size:clamp(72px, 10.5vw, 160px);color:var(--accent);user-select:none;white-space:nowrap;pointer-events:none
    }
    .title .iwrap{display:inline-flex;align-items:flex-end;position:relative;top:-0.02em}
    .title .paren{font-weight:700}
    .title .i{
      font-family:"Snell Roundhand","Apple Chancery","Brush Script MT",cursive;font-weight:400;font-size:0.9em;
      letter-spacing:-0.02em;position:relative;top:-0.02em;padding:0 0.02em
    }

    .pin{width:100%;position:relative}
    .pin-spacer{height:220vh}
    .pin-stage{position:sticky;top:0;height:100vh;width:100vw;margin-left:calc(50% - 50vw);background:#000;overflow:hidden}
    .pin-stage video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:#000}
    .pin-text{
      position:absolute;right:64px;bottom:56px;width:min(560px, 70vw);text-align:right;
      font-family: Arial, Helvetica, sans-serif;font-size:14px;line-height:1.55;letter-spacing:0.02em;color:var(--accent);
      white-space:pre-line;opacity:0;transform:translateX(22px);will-change: transform, opacity
    }
    .pin-text.on{opacity:1;transform:translateX(0);transition: opacity 320ms ease, transform 420ms ease}
    .pin-text.off{opacity:0;transform:translateX(22px);transition: opacity 240ms ease, transform 240ms ease}
    .tap-to-play{
      position:absolute;left:24px;bottom:24px;font-family: Arial, Helvetica, sans-serif;font-size:12px;letter-spacing:0.10em;text-transform:uppercase;
      color:rgba(242,239,231,0.85);background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.20);padding:10px 12px;border-radius:999px;
      display:none;cursor:pointer;user-select:none
    }

    .details{width:100%;position:relative}
    .details-spacer{height:220vh}
    .details-stage{
      position:sticky;top:0;height:100vh;width:100vw;margin-left:calc(50% - 50vw);background:var(--bg);
      overflow:hidden;display:flex;align-items:center;justify-content:center
    }
    .details-canvas{width:min(1280px, 96vw);height:min(720px, 78vh);position:relative}

    .details-label{
      position:absolute;top:26px;left:26px;font-family: Arial, Helvetica, sans-serif;font-size:24px;
      letter-spacing:0.10em;text-transform:uppercase;color:var(--muted)
    }

    .details-orange{
      position:absolute;
      top:calc(26px + var(--sq-right) + var(--grid-gap));
      right:calc(26px + var(--sq-right) + var(--grid-gap));
      width:var(--sq-right);height:var(--sq-right);
      padding:18px 18px;
      display:flex;align-items:flex-start;justify-content:flex-start;
      font-family: Arial, Helvetica, sans-serif;font-size:20px;line-height:1.20;letter-spacing:0.02em;color:var(--accent);
      text-align:left;white-space:pre-line
    }

    .sq{
      position:absolute;overflow:hidden;background:rgba(255,255,255,0.35);border:1px solid rgba(0,0,0,0.10);
      width:var(--sq-right);height:var(--sq-right)
    }
    .sq.left{width:var(--sq-left);height:var(--sq-left);left:26px;bottom:26px}

    .sq.r1{ right:calc(26px + var(--sq-right) + var(--grid-gap)); top:26px; }
    .sq.r2{ right:26px; top:26px; }
    .sq.r3{ right:26px; top:calc(26px + var(--sq-right) + var(--grid-gap)); }

    .sq img{width:100%;height:100%;object-fit:cover;display:block;filter:none}

    /* clickable squares */
    .sq-link{display:block;width:100%;height:100%}
    .sq-link:focus-visible{outline:2px solid rgba(226,74,26,0.55);outline-offset:3px}

    .reveal{opacity:0;transform: translateY(10px) scale(0.985);transition: opacity 520ms ease, transform 520ms ease;will-change: opacity, transform}
    .reveal.in{opacity:1;transform: translateY(0) scale(1)}

    .end{padding:40px 24px 60px;color:var(--muted);font-family: Arial, Helvetica, sans-serif;font-size:12px;letter-spacing:0.10em;text-transform:uppercase}

    @media (max-width: 980px){
      :root{ --sq-left:240px; --sq-right:190px; }
      .details-label{font-size:22px}
      .details-orange{font-size:18px}
    }
    @media (max-width: 720px){
      .header-inner{padding:14px 18px}
      .nav{gap:18px}
      .page{padding:18px 18px 0}
      .hero{padding-bottom:110px}
      .pin-text{right:18px;bottom:22px;width:min(560px, 86vw);font-size:13px}
      .tap-to-play{left:18px; bottom:18px}

      .details-spacer{height:auto}
      .details-stage{position:relative;height:auto}
      .details-canvas{height:auto;min-height:760px}
      .details-orange{position:static;width:auto;height:auto;padding:0;margin:84px 18px 16px}
      .details-label{left:18px; top:18px}
      .sq.left{left:18px; bottom:18px}
      .sq.r1{right:auto; left:18px; top:240px}
      .sq.r2{right:18px; top:240px}
      .sq.r3{right:18px; top:calc(240px + var(--sq-right) + var(--grid-gap))}
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <nav class="nav" aria-label="Primary">
        <a href="#shop">Shop</a>
        <a href="#details">Details</a>
        <a href="#story">Story</a>
      </nav>
    </div>
  </header>

  <div class="page">
    <main>
      <section class="hero" aria-label="Hero">
        <p class="kicker">designed to stay. built to sound</p>
        <div class="media-wrap" aria-label="Hero image and title">
          <div class="media">
            <img src="https://drive.google.com/uc?export=view&id=1Li0BTrGxhlvheWWVeVMLbuH7vD-X7GAt" alt="Alessi Still speaker" />
          </div>
          <div class="title" aria-hidden="true">
            S<span class="iwrap"><span class="paren">(</span><span class="i">i</span><span class="paren">)</span></span>TLL
          </div>
        </div>
      </section>

      <section class="pin" aria-label="Pinned video">
        <div class="pin-spacer">
          <div class="pin-stage" id="pinStage">
            <video id="pinVideo" src="https://drive.google.com/uc?export=view&id=1AqPfnv4Qkrrlj2n-Iy3Ucd68SrnUX535" muted playsinline loop preload="auto"></video>
            <div class="pin-text off" id="pinTextVideo">
Perforated stainless steel front.
Volume single control.
Matte technical rear for clean RF performance.
            </div>
            <button class="tap-to-play" id="tapToPlay" type="button">Tap to play</button>
          </div>
        </div>
      </section>

      <section class="details" id="details" aria-label="Details section">
        <div class="details-spacer">
          <div class="details-stage">
            <div class="details-canvas">
              <div class="details-label">DETAILS</div>
              <div class="details-orange">Alessi STILL holds
its place.</div>

              <div class="sq left reveal" data-reveal>
                <img src="image (5).png" alt="Detail image left" loading="lazy">
              </div>

              <!-- RIGHT 3 squares become links -->
              <div class="sq r1 reveal" data-reveal>
                <a class="sq-link" href="detail-a.html" aria-label="Open detail A">
                  <img src="https://drive.google.com/file/d/14vSntktw_LUZivWJrtFvQn-ZHxK7qz13/view?usp=drive_link" alt="Detail image 1" loading="lazy">
                </a>
              </div>

              <div class="sq r2 reveal" data-reveal>
                <a class="sq-link" href="detail-b.html" aria-label="Open detail B">
                  <img src="image (4).png" alt="Detail image 2" loading="lazy">
                </a>
              </div>

              <div class="sq r3 reveal" data-reveal>
                <a class="sq-link" href="detail-c.html" aria-label="Open detail C">
                  <img src="image (2).png" alt="Detail image 3" loading="lazy">
                </a>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="end" id="story">Alessi Still</div>
    </main>
  </div>

  <script>
    (function(){
      const video = document.getElementById("pinVideo");
      const stage = document.getElementById("pinStage");
      const text = document.getElementById("pinTextVideo");
      const tap = document.getElementById("tapToPlay");

      const VIDEO_DURATION_FALLBACK = 3.0;
      let lockedOn = false;

      async function tryPlay(){
        try{ await video.play(); tap.style.display = "none"; }
        catch(e){ tap.style.display = "inline-flex"; }
      }
      tap.addEventListener("click", () => { tryPlay(); });

      const ioVideo = new IntersectionObserver((entries) => {
        for (const entry of entries){
          if (entry.isIntersecting) tryPlay();
          else video.pause();
        }
      }, { threshold: 0.2 });
      if (stage) ioVideo.observe(stage);

      function updateVideoText(){
        const dur = Number.isFinite(video.duration) && video.duration > 0 ? video.duration : VIDEO_DURATION_FALLBACK;
        const progress = (video.currentTime % dur) / dur;
        if (!lockedOn && progress >= 0.60){
          lockedOn = true;
          text.classList.add("on");
          text.classList.remove("off");
        }
        requestAnimationFrame(updateVideoText);
      }
      video.addEventListener("loadeddata", () => { requestAnimationFrame(updateVideoText); tryPlay(); });
      setTimeout(() => { requestAnimationFrame(updateVideoText); tryPlay(); }, 700);

      const targets = Array.from(document.querySelectorAll("[data-reveal]"));
      const ioReveal = new IntersectionObserver((entries) => {
        for (const entry of entries){
          if (entry.isIntersecting){
            entry.target.classList.add("in");
            ioReveal.unobserve(entry.target);
          }
        }
      }, { threshold: 0.35 });
      targets.forEach(t => ioReveal.observe(t));

      const header = document.querySelector("header");
      const headerH = () => header ? Math.ceil(header.getBoundingClientRect().height) : 0;
      document.querySelectorAll('a[href^="#"]').forEach(a => {
        a.addEventListener("click", (e) => {
          const id = a.getAttribute("href");
          const el = document.querySelector(id);
          if (!el) return;
          e.preventDefault();
          const top = el.getBoundingClientRect().top + window.scrollY - headerH() - 10;
          window.scrollTo({ top, behavior:"smooth" });
        });
      });
    })();
  </script>
</body>
</html>
